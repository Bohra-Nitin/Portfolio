<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visit Portfolio</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
            width:350px;
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0056b3;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Visit Portfolio</h2>

    <input type="text" id="username" placeholder="Enter Name">
    <input type="email" id="email" placeholder="Enter Email">

    <button onclick="goPortfolio()">Visit Portfolio</button>
</div>


<!-- Your existing JS files -->

<script src="cryptojs_v3.1.2.js"></script>
<script src="xapiwrapper.js"></script>
<script src="interaction.js"></script>

<script>
function goPortfolio()
{
    let username = document.getElementById("username").value.trim();
    let email = document.getElementById("email").value.trim();

    if(username === "" || email === "")
    {
        alert("Please enter Name and Email first.");
        return;
    }

    /* Save data so interaction.js can use it */
    localStorage.setItem("username", username);
    localStorage.setItem("email", email);

    /* Open portfolio */
    window.location.href = "portfolio.html";
}
</script>

</body>
</html>
